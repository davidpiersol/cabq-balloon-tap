name: balloon_tap
description: >
  Balloon Tap — keep the balloon aloft with CABQ / Balloon Fiesta theming.
  One codebase targets iOS and Android.
publish_to: "none"
version: 0.1.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
