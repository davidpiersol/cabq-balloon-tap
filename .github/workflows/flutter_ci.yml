name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Bootstrap platform folders if missing
        run: |
          if [ ! -d ios ]; then flutter create . --project-name balloon_tap; fi

      - name: Dependencies
        run: flutter pub get

      - name: Rive native (macOS, required for flutter test)
        run: dart run rive_native:setup --verbose --clean --platform macos

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test
